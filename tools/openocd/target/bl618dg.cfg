# BL618DG target configuration.
# Select an adapter first, for example:
# openocd -f interface/ch347.cfg -f target/bl618dg.cfg
# openocd -f interface/nuclei_ftdi.cfg -f target/bl618dg.cfg

## bindto 0.0.0.0 can be used to cover all available interfaces.
## Uncomment bindto line to enable remote machine debug.
# bindto 0.0.0.0

# openocd variable set
if { [ info exists BOOT_HARTID ] } {
    puts "boot hart id expected to be $BOOT_HARTID"
    set BOOTHART $BOOT_HARTID
} else {
    puts "Set boot hart id to default 0"
    set BOOTHART 0
}

if { [ info exists SMP ] } {
    puts "SMP CPU count expected to be $SMP"
    set CORECNT $SMP
} else {
    puts "Set default SMP CPU count to default 1"
    set CORECNT 1
}

#jtag_ntrst_delay 200

#0x10900a6d
set _CHIPNAME0 riscv0
jtag newtap $_CHIPNAME0 cpu -irlen 5 -expected-id 0x10900a6d
set _TARGETNAME0_0 $_CHIPNAME0.cpu
#target create $_TARGETNAME0_0 riscv -chain-position $_CHIPNAME0.cpu -coreid 0

#0x10900a6d
set _CHIPNAME1 riscv1
jtag newtap $_CHIPNAME1 cpu -irlen 5 -expected-id 0x10900a6d
set _TARGETNAME1_0 $_CHIPNAME1.cpu
target create $_TARGETNAME1_0 riscv -chain-position $_CHIPNAME1.cpu -coreid 0

riscv set_command_timeout_sec 10

init

if { [ info exists pulse_srst ] && [ llength [ info commands adapter_pulse_srst ] ] } {
    adapter_pulse_srst
}

halt

# We must turn on this because otherwise the IDE version debug cannot download the program into flash

arm semihosting enable
